<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ministerio de Limpieza</title>

<style>

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
background:linear-gradient(135deg,#eaf2ff,#f8fbff);
color:#1a2a44;
}

/* ===== MENU ===== */
.menu-btn{
position:fixed;
top:15px;
left:15px;
font-size:22px;
background:white;
border:none;
border-radius:10px;
padding:8px 12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
z-index:1000;
}

.menu{
position:fixed;
top:0;
left:-250px;
width:220px;
height:100%;
background:white;
box-shadow:5px 0 20px rgba(0,0,0,0.1);
padding:20px;
transition:0.3s;
z-index:999;
}

.menu.open{
left:0;
}

.menu div{
padding:12px;
border-radius:10px;
cursor:pointer;
margin-bottom:10px;
color:#1f6fb2;
font-weight:500;
}

.menu div:hover{
background:#eef5ff;
}

/* ===== CONTENIDO ===== */
.container{
max-width:1000px;
margin:25px auto;
padding:30px;
border-radius:22px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(15px);
border:1px solid rgba(0,0,0,0.05);
box-shadow:0 20px 40px rgba(0,0,0,0.08);
animation:fadeIn 0.6s ease;
}

.tabs{
display:flex;
background:#eef5ff;
border-radius:14px;
padding:4px;
gap:4px;
margin-bottom:15px;
}

.tab{
flex:1;
text-align:center;
padding:8px;
border-radius:10px;
font-size:13px;
cursor:pointer;
color:#1f6fb2;
font-weight:500;
}

.tab.active{
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:30px;
margin:0;
font-weight:700;
letter-spacing:-0.5px;
color:#1f6fb2;
}

.header h2{
margin-top:5px;
font-size:15px;
opacity:0.6;
}

#titulo{
margin-top:15px;
font-size:14px;
font-weight:500;
color:#1f6fb2;
opacity:0.8;
text-align:center;
cursor:pointer;
}

.versiculo{
background:#eef5ff;
padding:14px;
border-radius:14px;
margin-top:15px;
font-style:italic;
font-size:13px;
display:none;
}

.referencia{
font-size:12px;
opacity:0.7;
margin-top:5px;
}

.tabla-container{
width:100%;
overflow-x:auto;
}

table{
width:100%;
margin-top:25px;
border-collapse:separate;
border-spacing:12px 28px;
}

th{
font-size:13px;
opacity:0.6;
font-weight:600;
padding-bottom:10px;
}

td{
padding:16px;
vertical-align:top;
background:white;
border-radius:14px;
box-shadow:0 8px 18px rgba(0,0,0,0.05);
}

td:first-child{
width:50px;
min-width:50px;
text-align:center;
padding:8px 4px;
}

.dia-badge{
display:inline-block;
padding:5px 8px;
border-radius:10px;
background:#eef5ff;
color:#1f6fb2;
font-size:10px;
font-weight:600;
}

textarea{
width:100%;
background:#f5f9ff;
border:1px solid rgba(0,0,0,0.05);
border-radius:12px;
padding:12px;
color:#1a2a44;
resize:none;
height:90px;
font-size:13px;
}

textarea.readonly{
background:#f0f0f0;
pointer-events:none;
}

.peticion{
margin-top:30px;
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

.botones{
display:flex;
gap:15px;
margin-top:25px;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
color:white;
}

.guardar{
background:linear-gradient(135deg,#4da3ff,#1f6fb2);
}

.enviar{
background:linear-gradient(135deg,#1f6fb2,#0b3d91);
}

/* ===== ENVIOS ===== */
#envios{
display:none;
margin-top:20px;
}

.card-envio{
background:white;
padding:15px;
border-radius:14px;
margin-bottom:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
font-size:13px;
}

</style>
</head>

<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="menu" id="menu">
<div onclick="mostrarVista('devocional')">Mi devocional</div>
<div onclick="mostrarVista('envios')">Envíos</div>
</div>

<div class="container" id="devocional">

<div class="header">
<h1>Ministerio de Limpieza</h1>
<h2>Registro Devocional Semanal</h2>
<div id="versiculo" class="versiculo">
“Porque Dios no es injusto para olvidar vuestra obra…”
<div class="referencia">Hebreos 6:10</div>
</div>
</div>

<div id="login" class="login">
<h3>Ingresar Usuario</h3>
<input id="usuario" placeholder="Escribe tu usuario">
<br>
<button onclick="entrar()">Entrar</button>
</div>

<div id="app" style="display:none">

<h3 id="titulo"></h3>

<div class="tabla-container">
<table>
<tr>
<th>Día</th>
<th>Lectura</th>
<th>Oración</th>
<th>Dios habló</th>
</tr>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="peticion">
<strong>Petición de oración</strong>
<br><br>
<textarea id="peticion"></textarea>
</div>

<div class="botones">
<button class="guardar" onclick="guardar()">Guardar</button>
<button class="enviar" onclick="enviar()">Enviar</button>
</div>

</div>
</div>

<!-- ===== ENVIOS ===== -->
<div class="container" id="envios">
<h2>Envíos</h2>
<div id="listaEnvios"></div>
</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbyYwcuWOCdorgkWBybhxrZt2NwiGPr4A_6FAH1b2FGNOEbcxf5SXZgc7NffPRVH7hHdog/exec";

function toggleMenu(){
document.getElementById("menu").classList.toggle("open");
}

function mostrarVista(vista){
document.getElementById("menu").classList.remove("open");

if(vista==="devocional"){
document.getElementById("devocional").style.display="block";
document.getElementById("envios").style.display="none";
}else{
document.getElementById("devocional").style.display="none";
document.getElementById("envios").style.display="block";
cargarEnvios();
}
}

function cargarEnvios(){
fetch(URL)
.then(res=>res.json())
.then(data=>{
let html="";
data.reverse().forEach(e=>{
html+=`
<div class="card-envio">
<b>${e.usuario}</b> - ${e.dia}<br>
Lectura: ${e.lectura}<br>
Oración: ${e.oracion}<br>
Dios habló: ${e.dios}
</div>`;
});
document.getElementById("listaEnvios").innerHTML=html;
});
}

/* ===== TU CODIGO ORIGINAL ABAJO SIN CAMBIOS ===== */

const dias=["Lun","Mar","Mié","Jue","Vie","Sáb"];
let usuario="";

function entrar(){
usuario=document.getElementById("usuario").value.trim();
if(usuario==""){alert("Escribe un usuario");return;}

localStorage.setItem("usuario",usuario);

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("titulo").innerText="Usuario: "+usuario;
crearTabla();
}

function crearTabla(){
let html="";
dias.forEach(d=>{
html+=`
<tr>
<td>${d}</td>
<td><textarea id="${d}-lectura"></textarea></td>
<td><textarea id="${d}-oracion"></textarea></td>
<td><textarea id="${d}-dios"></textarea></td>
</tr>`;
});
document.getElementById("tabla").innerHTML=html;
}

function guardar(){
alert("Guardado");
}

function enviar(){
alert("Simulación envío OK");
}

</script>

</body>
</html>

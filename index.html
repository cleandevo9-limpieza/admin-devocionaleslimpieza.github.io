<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ministerio de Limpieza</title>

<style>

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
background:linear-gradient(135deg,#eaf2ff,#f8fbff);
color:#1a2a44;
}

/* MENU */
.menu-btn{
position:absolute;
top:15px;
left:15px;
font-size:22px;
cursor:pointer;
z-index:10;
}

.menu{
position:absolute;
top:50px;
left:15px;
background:white;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
display:none;
overflow:hidden;
}

.menu div{
padding:12px 18px;
cursor:pointer;
font-size:14px;
}

.menu div:hover{
background:#eef5ff;
}

/* TABLA ENVIOS */
#envios{
display:none;
margin-top:20px;
}

#envios table{
width:100%;
border-collapse:separate;
border-spacing:12px;
}

#envios td, #envios th{
background:white;
padding:14px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 12px rgba(0,0,0,0.05);
font-size:13px;
}

.container{
max-width:1000px;
margin:25px auto;
padding:30px;
border-radius:22px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(15px);
border:1px solid rgba(0,0,0,0.05);
box-shadow:0 20px 40px rgba(0,0,0,0.08);
animation:fadeIn 0.6s ease;
}

.tabs{
display:flex;
background:#eef5ff;
border-radius:14px;
padding:4px;
gap:4px;
margin-bottom:15px;
}

.tab{
flex:1;
text-align:center;
padding:8px;
border-radius:10px;
font-size:13px;
cursor:pointer;
color:#1f6fb2;
font-weight:500;
}

.tab.active{
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:30px;
margin:0;
font-weight:700;
letter-spacing:-0.5px;
color:#1f6fb2;
}

.header h2{
margin-top:5px;
font-size:15px;
opacity:0.6;
}

#titulo{
margin-top:15px;
font-size:14px;
font-weight:500;
color:#1f6fb2;
opacity:0.8;
text-align:center;
cursor:pointer;
}

.versiculo{
background:#eef5ff;
padding:14px;
border-radius:14px;
margin-top:15px;
font-style:italic;
font-size:13px;
display:none;
}

.referencia{
font-size:12px;
opacity:0.7;
margin-top:5px;
}

.tabla-container{
width:100%;
overflow-x:auto;
}

table{
width:100%;
margin-top:25px;
border-collapse:separate;
border-spacing:12px 28px;
}

th{
font-size:13px;
opacity:0.6;
font-weight:600;
padding-bottom:10px;
}

td{
padding:16px;
vertical-align:top;
background:white;
border-radius:14px;
box-shadow:0 8px 18px rgba(0,0,0,0.05);
}

td:first-child{
width:50px;
min-width:50px;
text-align:center;
padding:8px 4px;
}

.dia-badge{
display:inline-block;
padding:5px 8px;
border-radius:10px;
background:#eef5ff;
color:#1f6fb2;
font-size:10px;
font-weight:600;
}

textarea{
width:100%;
background:#f5f9ff;
border:1px solid rgba(0,0,0,0.05);
border-radius:12px;
padding:12px;
color:#1a2a44;
resize:none;
height:90px;
font-size:13px;
transition:0.2s;
}

textarea:focus{
outline:none;
border:1px solid #4da3ff;
background:white;
box-shadow:0 0 0 2px rgba(77,163,255,0.2);
}

.peticion{
margin-top:30px;
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

.botones{
display:flex;
gap:15px;
margin-top:25px;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.25s;
color:white;
}

.guardar{
background:linear-gradient(135deg,#4da3ff,#1f6fb2);
}

.enviar{
background:linear-gradient(135deg,#1f6fb2,#0b3d91);
}

.login{
text-align:center;
padding:30px 10px;
}

.login input{
padding:12px;
border:1px solid rgba(0,0,0,0.1);
border-radius:12px;
background:white;
text-align:center;
width:80%;
max-width:250px;
}

.login button{
margin-top:10px;
padding:12px 25px;
background:linear-gradient(135deg,#1f6fb2,#0b3d91);
color:white;
}

</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<div onclick="mostrarDevocional()">Mi devocional</div>
<div onclick="mostrarEnvios()">Envíos</div>
</div>

<div class="container">

<div id="envios">
<h3>Historial de Envíos</h3>
<table>
<tr>
<th>Usuario</th>
<th>Hora</th>
<th>Minutos Orados</th>
</tr>
<tbody id="tablaEnvios"></tbody>
</table>
</div>

<div id="contenidoPrincipal">

<div class="tabs" id="tabs" style="display:none;"></div>

<div class="header">
<h1>Ministerio de Limpieza</h1>
<h2>Registro Devocional Semanal</h2>

<div id="versiculo" class="versiculo">
“Porque Dios no es injusto para olvidar vuestra obra…”
<div class="referencia">Hebreos 6:10 RV 1960</div>
</div>
</div>

<div id="login" class="login">
<h3>Ingresar Usuario</h3>
<input id="usuario" placeholder="Escribe tu usuario">
<br>
<button onclick="entrar()">Entrar</button>
</div>

<div id="app" style="display:none">

<h3 id="titulo"></h3>

<div class="tabla-container">
<table>
<tr>
<th>Día</th>
<th>Lectura</th>
<th>Oración (min)</th>
<th>Lo que Dios me habló</th>
</tr>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="peticion">
<strong>Petición de oración</strong>
<br><br>
<textarea id="peticion"></textarea>
</div>

<div class="botones">
<button class="guardar" onclick="guardar()">Guardar</button>
<button class="enviar" onclick="enviar()">Enviar</button>
</div>

</div>

</div>

</div>

<script>

const dias=["Lun","Mar","Mié","Jue","Vie","Sáb"];
let usuario="";

/* MENU */
function toggleMenu(){
let m=document.getElementById("menu");
m.style.display=m.style.display==="block"?"none":"block";
}

function mostrarEnvios(){
document.getElementById("contenidoPrincipal").style.display="none";
document.getElementById("envios").style.display="block";
cargarEnvios();
toggleMenu();
}

function mostrarDevocional(){
document.getElementById("contenidoPrincipal").style.display="block";
document.getElementById("envios").style.display="none";
toggleMenu();
}

function cargarEnvios(){
let lista=JSON.parse(localStorage.getItem("envios"))||[];
let html="";
lista.forEach(e=>{
html+=`<tr><td>${e.usuario}</td><td>${e.hora}</td><td>${e.minutos}</td></tr>`;
});
document.getElementById("tablaEnvios").innerHTML=html;
}

/* LOGIN */
window.onload=function(){
let u=localStorage.getItem("usuario");
if(u){usuario=u; iniciar();}
}

function entrar(){
usuario=document.getElementById("usuario").value.trim();
if(!usuario){alert("Escribe un usuario"); return;}
localStorage.setItem("usuario",usuario);
iniciar();
}

function iniciar(){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("titulo").innerText="Usuario: "+usuario;
document.getElementById("versiculo").style.display="block";
crearTabla();
cargar();
}

/* TABLA */
function crearTabla(){
let html="";
dias.forEach(d=>{
html+=`
<tr>
<td><span class="dia-badge">${d}</span></td>
<td><textarea id="${d}-lectura"></textarea></td>
<td><textarea id="${d}-oracion"></textarea></td>
<td><textarea id="${d}-dios"></textarea></td>
</tr>`;
});
document.getElementById("tabla").innerHTML=html;
}

/* GUARDAR */
function guardar(){
let data={};
dias.forEach(d=>{
data[d]={
lectura:document.getElementById(d+"-lectura").value,
oracion:document.getElementById(d+"-oracion").value,
dios:document.getElementById(d+"-dios").value
}
});
data.peticion=document.getElementById("peticion").value;
localStorage.setItem("datos",JSON.stringify(data));
alert("Guardado");
}

/* CARGAR */
function cargar(){
let data=JSON.parse(localStorage.getItem("datos"));
if(!data) return;
dias.forEach(d=>{
document.getElementById(d+"-lectura").value=data[d]?.lectura||"";
document.getElementById(d+"-oracion").value=data[d]?.oracion||"";
document.getElementById(d+"-dios").value=data[d]?.dios||"";
});
document.getElementById("peticion").value=data.peticion||"";
}

/* ENVIAR */
function enviar(){

let btn=document.querySelector(".enviar");
btn.disabled=true;
btn.innerText="Enviando...";
btn.style.background="gray";

let datos=[];
let total=0;

dias.forEach(d=>{
let oracion=document.getElementById(d+"-oracion").value.trim();
total+=parseInt(oracion)||0;

datos.push({
usuario,
dia:d,
lectura:document.getElementById(d+"-lectura").value,
oracion,
dios:document.getElementById(d+"-dios").value
});
});

/* GUARDAR HISTORIAL */
let lista=JSON.parse(localStorage.getItem("envios"))||[];
lista.push({
usuario,
hora:new Date().toLocaleString(),
minutos:total
});
localStorage.setItem("envios",JSON.stringify(lista));

fetch("https://script.google.com/macros/s/AKfycbyYwcuWOCdorgkWBybhxrZt2NwiGPr4A_6FAH1b2FGNOEbcxf5SXZgc7NffPRVH7hHdog/exec",{
method:"POST",
mode:"no-cors",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(datos)
})
.then(()=>{
alert("Enviado");
localStorage.removeItem("datos");
btn.innerText="Enviado";
})
.catch(()=>{
alert("Error");
btn.disabled=false;
btn.innerText="Enviar";
});

}

</script>

</body>
</html>
